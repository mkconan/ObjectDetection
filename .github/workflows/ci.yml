name: CI

on:
  push:
  pull_request:

jobs:
  setup-env:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync

  tiny-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: setup-env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync

      - name: Create tiny COCO
        run: uv run python scripts/make_tiny_coco.py

      - name: Load tiny COCO
        run: uv run python scripts/check_tiny_coco.py

      - name: Train one epoch (tiny)
        run: |
          uv run python src/engine.py \
            data.root=data/coco_tiny/images/train2017 \
            data.ann_file=data/coco_tiny/annotations/instances_train2017.json \
            data.val_root=data/coco_tiny/images/val2017 \
            data.val_ann_file=data/coco_tiny/annotations/instances_val2017.json \
            learning.batch_size=2 \
            learning.epochs=1 \
            device=cpu

      - name: Train one epoch dino_v3 (tiny)
        run: |
          uv run python src/engine.py \
            model=dino_v3 \
            data.root=data/coco_tiny/images/train2017 \
            data.ann_file=data/coco_tiny/annotations/instances_train2017.json \
            data.val_root=data/coco_tiny/images/val2017 \
            data.val_ann_file=data/coco_tiny/annotations/instances_val2017.json \
            learning.batch_size=2 \
            learning.epochs=1 \
            device=cpu
