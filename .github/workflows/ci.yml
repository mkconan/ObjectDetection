name: CI

on:
  push:
  pull_request:

jobs:
  tiny-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync dependencies
        run: uv sync

      - name: Create tiny COCO
        run: uv run python scripts/make_tiny_coco.py

      - name: Load tiny COCO
        run: uv run python scripts/check_tiny_coco.py

      - name: Train one epoch (tiny)
        run: |
          uv run python src/engine.py \
            data.root=data/coco_tiny/images/train2017 \
            data.ann_file=data/coco_tiny/annotations/instances_train2017.json \
            data.val_root=data/coco_tiny/images/val2017 \
            data.val_ann_file=data/coco_tiny/annotations/instances_val2017.json \
            learning.batch_size=2 \
            learning.epochs=1 \
            device=cpu
